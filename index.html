<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#4f8ef7"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="PericiasMed"/>
  <link rel="manifest" href="./manifest.json"/>
  <title>PericiasMed</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
    :root{
      --bg:#0f1117;--surface:#1a1d27;--card:#21243a;--border:#2d3155;
      --accent:#4f8ef7;--accent2:#7c5cfc;--green:#34d399;--yellow:#fbbf24;
      --red:#f87171;--text:#e2e8f0;--muted:#8891aa
    }
    /* layout */
    .app{display:flex;min-height:100vh}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);
      display:flex;flex-direction:column;padding:20px 14px;gap:6px;
      position:fixed;top:0;left:0;bottom:0;z-index:10;overflow-y:auto}
    .main{margin-left:220px;flex:1;padding:28px;padding-bottom:80px}
    /* logo */
    .logo{display:flex;align-items:center;gap:10px;padding:0 4px 20px;border-bottom:1px solid var(--border);margin-bottom:8px}
    .logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#4f8ef7,#7c5cfc);
      display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .logo-text{font-size:14px;font-weight:700}
    .logo-sub{font-size:10px;color:var(--muted);font-family:monospace}
    .nav-sec{font-size:10px;color:var(--muted);padding:14px 8px 4px;text-transform:uppercase;letter-spacing:.08em}
    .nav-btn{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;
      cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);
      transition:all .15s;border:none;background:none;width:100%;text-align:left}
    .nav-btn:hover{color:var(--text);background:var(--card)}
    .nav-btn.active{color:var(--accent);background:rgba(79,142,247,.14)}
    /* page */
    .page-title{font-size:21px;font-weight:700;margin-bottom:4px}
    .page-sub{color:var(--muted);font-size:13px;margin-bottom:24px}
    /* stats */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
    .stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;font-family:monospace}
    .stat-val{font-size:26px;font-weight:700;font-family:monospace}
    .c-b{color:var(--accent)}.c-g{color:var(--green)}.c-y{color:var(--yellow)}.c-r{color:var(--red)}
    /* toolbar */
    .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
    .srch{flex:1;min-width:180px;background:var(--card);border:1px solid var(--border);
      border-radius:8px;padding:9px 13px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
    .srch:focus{border-color:var(--accent)}
    .srch::placeholder{color:var(--muted)}
    .fsel{background:var(--card);border:1px solid var(--border);border-radius:8px;
      padding:9px 10px;color:var(--text);font-size:13px;cursor:pointer;outline:none;font-family:inherit}
    .btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;
      font-weight:600;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
    .btn-p{background:linear-gradient(135deg,#4f8ef7,#7c5cfc);color:#fff}
    .btn-p:hover{opacity:.9}
    .btn-g{background:linear-gradient(135deg,#059669,#34d399);color:#fff}
    .btn-g:hover{opacity:.9}
    .btn-d{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
    .btn-o{background:var(--card);color:var(--muted);border:1px solid var(--border)}
    .btn-o:hover{color:var(--text)}
    .btn-sm{padding:5px 9px;font-size:12px}
    /* table */
    .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:600px}
    th{background:var(--surface);font-size:10px;font-family:monospace;text-transform:uppercase;
      color:var(--muted);padding:11px 14px;text-align:left;font-weight:500;letter-spacing:.05em;white-space:nowrap}
    td{padding:12px 14px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle}
    tr:hover td{background:rgba(255,255,255,.02)}
    /* badge */
    .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;
      font-size:11px;font-weight:600;font-family:monospace;white-space:nowrap}
    .b-ag{background:rgba(79,142,247,.15);color:var(--accent)}
    .b-re{background:rgba(52,211,153,.15);color:var(--green)}
    .b-pe{background:rgba(251,191,36,.15);color:var(--yellow)}
    .b-ca{background:rgba(248,113,113,.15);color:var(--red)}
    .b-la{background:rgba(124,92,252,.15);color:var(--accent2)}
    .b-rg{background:rgba(248,113,113,.1);color:#fca5a5;border:1px solid rgba(248,113,113,.25);font-size:10px}
    /* overlay / modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);
      display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
      width:100%;max-width:580px;padding:28px;max-height:92vh;overflow-y:auto}
    .modal-wide{max-width:740px}
    .modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
    .modal-title{font-size:16px;font-weight:700}
    /* form */
    .form-row{display:grid;gap:14px;margin-bottom:14px}
    .f2{grid-template-columns:1fr 1fr}
    .f3{grid-template-columns:1fr 1fr 1fr}
    .field label{display:block;font-size:10px;font-family:monospace;color:var(--muted);
      text-transform:uppercase;margin-bottom:5px;letter-spacing:.04em}
    .field input,.field select,.field textarea{width:100%;background:var(--card);
      border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);
      font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
    .field textarea{resize:vertical;min-height:68px}
    .mfooter{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
    /* import */
    .import-ta{width:100%;min-height:160px;background:var(--bg);border:1px solid var(--border);
      border-radius:8px;padding:12px;color:var(--text);font-size:12px;font-family:monospace;
      outline:none;resize:vertical;line-height:1.6}
    .import-ta:focus{border-color:var(--accent)}
    .parse-list{background:var(--bg);border:1px solid var(--border);border-radius:10px;
      overflow:hidden;margin-top:14px;max-height:300px;overflow-y:auto}
    .parse-hdr{padding:10px 14px;background:var(--surface);font-size:11px;font-family:monospace;
      color:var(--muted);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
    .parse-row{padding:9px 14px;border-top:1px solid var(--border);font-size:12px;
      display:flex;gap:12px;align-items:center;cursor:pointer}
    .parse-row:hover{background:rgba(255,255,255,.02)}
    .chk{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
    .chk.on{background:var(--accent);border-color:var(--accent);color:#fff}
    /* detail */
    .detail-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:14px}
    .d-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
    .d-field label{display:block;font-size:10px;font-family:monospace;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
    .d-field span{font-size:14px}
    /* timeline */
    .tl{display:flex;flex-direction:column}
    .tl-item{display:flex;gap:14px}
    .tl-line{display:flex;flex-direction:column;align-items:center;width:18px}
    .tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
    .tl-bar{flex:1;width:2px;background:var(--border);margin:3px 0}
    .tl-body{padding-bottom:18px;flex:1}
    .tl-date{font-size:11px;color:var(--muted);font-family:monospace}
    /* empty */
    .empty{text-align:center;padding:52px 20px;color:var(--muted)}
    .empty-ic{font-size:38px;margin-bottom:10px}
    .empty h3{color:var(--text);font-size:15px;margin-bottom:4px}
    /* toast */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#0f1117;
      padding:11px 18px;border-radius:10px;font-weight:700;font-size:13px;z-index:999;
      animation:sup .2s ease}
    @keyframes sup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
    /* mobile bottom nav */
    .bnav{display:none;position:fixed;bottom:0;left:0;right:0;
      background:var(--surface);border-top:1px solid var(--border);z-index:50}
    .bnav-btn{flex:1;border:none;background:none;display:flex;flex-direction:column;
      align-items:center;gap:2px;padding:8px 4px;cursor:pointer;
      font-family:inherit;font-size:10px;transition:color .15s}
    .bnav-ic{font-size:20px}
    /* responsive */
    @media(max-width:860px){
      .sidebar{display:none}
      .main{margin-left:0;padding:16px;padding-bottom:80px}
      .stats{grid-template-columns:1fr 1fr}
      .f2,.f3{grid-template-columns:1fr}
      .d-grid{grid-template-columns:1fr}
      .bnav{display:flex}
    }
    @media(max-width:500px){
      .stats{grid-template-columns:1fr 1fr}
      .toolbar{gap:7px}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';
const h = React.createElement;
const {useState,useReducer,useMemo,useRef,useEffect,useCallback} = React;

// ── Constantes ──────────────────────────────────────────────────────────────
const TIPOS  = ['Previdenciária','Trabalhista','Acidente de Trabalho','Criminal','Cível','Administrativa'];
const STATUS = ['Agendada','Realizada','Pendente','Cancelada','Laudo Emitido'];
const ORGAO_PAD = 'Justiça Federal – 5ª Região';
const STORAGE  = 'pericias_v2';

const MESES = {janeiro:'01',fevereiro:'02',março:'03',abril:'04',maio:'05',junho:'06',
  julho:'07',agosto:'08',setembro:'09',outubro:'10',novembro:'11',dezembro:'12'};

const BADGE = {
  'Agendada':'b-ag','Realizada':'b-re','Pendente':'b-pe',
  'Cancelada':'b-ca','Laudo Emitido':'b-la'
};

const fmt = d => d ? new Date(d+'T12:00').toLocaleDateString('pt-BR') : '–';

// ── Storage ──────────────────────────────────────────────────────────────────
let nextId = 10;
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr) && arr.length) {
        nextId = Math.max(...arr.map(p => p.id||0)) + 1;
        return arr;
      }
    }
  } catch(e){}
  return null;
}
function saveData(arr) {
  try { localStorage.setItem(STORAGE, JSON.stringify(arr)); } catch(e){}
}

// ── Reducer ──────────────────────────────────────────────────────────────────
const INIT = loadData() || [
  {id:1,paciente:'José Augusto Lima',cpf:'',processo:'2024.001.0012',tipo:'Previdenciária',
   status:'Realizada',data:'2025-11-14',hora:'09:00',cid:'M54.5',patologia:'Lombociatalgia crônica',
   orgao:'INSS – Ag. Centro',laudo:'Incapacidade parcial e temporária por 90 dias.',obs:'',reagendado:false}
];

function reducer(state, a) {
  switch(a.type) {
    case 'ADD':     return [...state, {...a.p, id:nextId++}];
    case 'BATCH':   return [...state, ...a.list.map(p => ({...p, id:nextId++}))];
    case 'UPD':     return state.map(p => p.id===a.p.id ? a.p : p);
    case 'DEL':     return state.filter(p => p.id!==a.id);
    case 'REPLACE': { const mx=Math.max(...a.list.map(p=>p.id||0)); nextId=mx+1; return a.list; }
    default:        return state;
  }
}

// ── Parser pauta ──────────────────────────────────────────────────────────────
function parsePauta(text) {
  const dm = text.match(/DIA\s+(\d{1,2})\s+DE\s+(\w+)\s+DE\s+(\d{4})/i);
  let dataBase = '';
  if (dm) {
    const mes = MESES[dm[2].toLowerCase()] || '01';
    dataBase = `${dm[3]}-${mes}-${dm[1].padStart(2,'0')}`;
  }
  const RE = /^\s*(\d+)\s+([\d-]+\.[\d.]+)\s+([A-ZÁÉÍÓÚÃÕÂÊÎÔÛÀÇ][A-ZÁÉÍÓÚÃÕÂÊÎÔÛÀÇ\s]+?)\s+(\d{2}:\d{2}|\*)/gm;
  const items = [];
  let m;
  while ((m = RE.exec(text)) !== null) {
    const nome = m[3].trim().replace(/\s+/g,' ');
    if (nome.includes('PERICIANDO') || nome.includes('Nº')) continue;
    items.push({seq:+m[1], processo:m[2].trim(), paciente:nome,
      hora: m[4]==='*' ? '' : m[4], reagendado: m[4]==='*', data:dataBase});
  }
  return {items, dataBase};
}

// ── Helpers UI ────────────────────────────────────────────────────────────────
function div(cls, ...ch)  { return h('div', {className:cls}, ...ch); }
function span(cls, ...ch) { return h('span',{className:cls}, ...ch); }
function btn(cls, onClick, ...ch) { return h('button',{className:'btn '+cls, onClick}, ...ch); }

function Badge(s) {
  return span('badge '+(BADGE[s]||''), '● ', s);
}

function Field({label, children}) {
  return h('div',{className:'field'}, h('label',null,label), children);
}

// ── Formulário de perícia ─────────────────────────────────────────────────────
const EMPTY = {paciente:'',cpf:'',processo:'',tipo:TIPOS[0],status:'Agendada',
  data:'',hora:'',cid:'',patologia:'',orgao:'',laudo:'',obs:'',reagendado:false};

function PericiaForm({initial, onSave, onClose}) {
  const [f,setF] = useState(initial || EMPTY);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const ok = f.paciente && f.data;
  const inp = (k,placeholder,type='text') =>
    h('input',{value:f[k],onChange:set(k),placeholder,type});
  const sel = (k,opts) =>
    h('select',{value:f[k],onChange:set(k)}, opts.map(o=>h('option',{key:o,value:o},o)));
  const ta = (k,placeholder) =>
    h('textarea',{value:f[k],onChange:set(k),placeholder});

  return h('div',null,
    h('div',{className:'form-row f2'},
      h(Field,{label:'Paciente / Periciando'}, inp('paciente','Nome completo')),
      h(Field,{label:'CPF'}, inp('cpf','***.***.000-00'))
    ),
    h('div',{className:'form-row f3'},
      h(Field,{label:'Nº Processo'}, inp('processo','0000000-00.0000.0.00.0000')),
      h(Field,{label:'Tipo'}, sel('tipo',TIPOS)),
      h(Field,{label:'Status'}, sel('status',STATUS))
    ),
    h('div',{className:'form-row f3'},
      h(Field,{label:'Data'}, inp('data','','date')),
      h(Field,{label:'Hora'}, inp('hora','','time')),
      h(Field,{label:'CID-10'}, inp('cid','Ex: M54.5'))
    ),
    h('div',{className:'form-row f2'},
      h(Field,{label:'Patologia'}, inp('patologia','Descrição clínica')),
      h(Field,{label:'Órgão / Instância'}, inp('orgao','Ex: INSS – Ag. Centro'))
    ),
    h('div',{className:'form-row'},
      h(Field,{label:'Conclusão do Laudo'}, ta('laudo','Síntese da conclusão pericial...'))
    ),
    h('div',{className:'form-row'},
      h(Field,{label:'Observações'}, ta('obs','Notas, documentos pendentes, etc.'))
    ),
    h('div',{className:'mfooter'},
      btn('btn-o',onClose,'Cancelar'),
      h('button',{
        className:'btn btn-p',
        disabled:!ok, style:ok?{}:{opacity:.5},
        onClick:()=>{ if(ok){onSave(f);onClose();} }
      },'💾 Salvar')
    )
  );
}

// ── Importador ───────────────────────────────────────────────────────────────
function Importador({existentes, onImport, onClose}) {
  const [txt,  setTxt]  = useState('');
  const [parsed,setParsed] = useState(null);
  const [sel,  setSel]  = useState({});
  const [tipo, setTipo] = useState(TIPOS[0]);
  const [orgao,setOrgao]= useState(ORGAO_PAD);

  const procsCad = useMemo(()=>new Set(existentes.map(p=>p.processo)),[existentes]);

  const handleParse = () => {
    const r = parsePauta(txt);
    if (!r.items.length){ alert('Nenhuma linha reconhecida. Verifique o formato.'); return; }
    const s={};
    r.items.forEach(it=>{ s[it.seq]=!procsCad.has(it.processo); });
    setSel(s); setParsed(r);
  };

  const toggle = seq => setSel(s=>({...s,[seq]:!s[seq]}));
  const toggleAll = v => { const s={}; parsed.items.forEach(it=>s[it.seq]=v); setSel(s); };
  const qtd = parsed ? parsed.items.filter(it=>sel[it.seq]).length : 0;

  const doImport = () => {
    const list = parsed.items.filter(it=>sel[it.seq]).map(it=>({
      paciente:it.paciente, cpf:'', processo:it.processo, tipo,
      status: it.reagendado?'Pendente':'Agendada',
      data:it.data, hora:it.hora, cid:'', patologia:'', orgao,
      laudo:'', obs:it.reagendado?'Reagendado — verificar disponibilidade.':'',
      reagendado:it.reagendado
    }));
    onImport(list); onClose();
  };

  return h('div',{className:'overlay'},
    h('div',{className:'modal modal-wide'},
      h('div',{className:'modal-hdr'},
        h('div',{className:'modal-title'},'📥 Importar Pauta da Justiça Federal'),
        btn('btn-o btn-sm',onClose,'✕')
      ),
      h('p',{style:{fontSize:13,color:'var(--muted)',marginBottom:14,lineHeight:1.6}},
        'Cole o texto copiado do PDF ou site da Justiça Federal. O sistema detecta número, processo, nome e horário automaticamente.'
      ),
      h('textarea',{
        className:'import-ta',
        placeholder:'Cole aqui o conteúdo da pauta...\n\nExemplo:\nDIA 30 DE JUNHO DE 2026\n1 0033444-66.2026.4.05.8300 EDUARDO FERREIRA DA SILVA 07:00\n2 0045456-49.2025.4.05.8300 SUZANA NOGUEIRA DE LIMA 07:12',
        value:txt, onChange:e=>{setTxt(e.target.value);setParsed(null);}
      }),
      h('div',{className:'form-row f2',style:{marginTop:14}},
        h(Field,{label:'Tipo (padrão)'},
          h('select',{className:'fsel',value:tipo,onChange:e=>setTipo(e.target.value),style:{width:'100%'}},
            TIPOS.map(t=>h('option',{key:t},t)))
        ),
        h(Field,{label:'Órgão / Instância'},
          h('input',{style:{width:'100%',background:'var(--card)',border:'1px solid var(--border)',
            borderRadius:8,padding:'9px 11px',color:'var(--text)',fontSize:13,outline:'none',fontFamily:'inherit'},
            value:orgao,onChange:e=>setOrgao(e.target.value)})
        )
      ),
      h('div',{style:{display:'flex',gap:10,marginBottom:14,alignItems:'center'}},
        h('button',{className:'btn btn-p',onClick:handleParse,disabled:!txt.trim(),style:!txt.trim()?{opacity:.5}:{}},'🔍 Interpretar Pauta'),
        parsed && h('span',{style:{fontSize:12,color:'var(--green)'}},
          `✓ ${parsed.items.length} periciandos • ${parsed.dataBase?fmt(parsed.dataBase):'data não detectada'}`)
      ),
      parsed && parsed.items.length>0 && h('div',{className:'parse-list'},
        h('div',{className:'parse-hdr'},
          h('span',null,`${qtd} de ${parsed.items.length} selecionados`),
          h('div',{style:{display:'flex',gap:6}},
            h('button',{className:'btn btn-o btn-sm',onClick:()=>toggleAll(true)},'Marcar todas'),
            h('button',{className:'btn btn-o btn-sm',onClick:()=>toggleAll(false)},'Desmarcar')
          )
        ),
        parsed.items.map(it=>{
          const cad = procsCad.has(it.processo);
          return h('div',{key:it.seq,className:'parse-row',style:{opacity:cad?.5:1},
              onClick:()=>!cad&&toggle(it.seq)},
            h('div',{className:'chk'+(sel[it.seq]?' on':'')}, sel[it.seq]?'✓':''),
            h('span',{style:{fontFamily:'monospace',fontSize:11,color:'var(--muted)',minWidth:22}},it.seq),
            h('div',{style:{flex:1}},
              h('div',{style:{fontWeight:600,fontSize:13}},it.paciente),
              h('span',{style:{fontSize:11,color:'var(--muted)',fontFamily:'monospace'}},it.processo),
              cad && h('span',{style:{fontSize:10,color:'var(--yellow)',marginLeft:8}},'já cadastrado')
            ),
            h('span',{style:{fontSize:12,fontFamily:'monospace',color:it.hora?'var(--text)':'var(--muted)'}},
              it.hora||'—'),
            it.reagendado && h('span',{className:'badge b-rg',style:{marginLeft:4}},'reagendado')
          );
        })
      ),
      h('div',{className:'mfooter'},
        btn('btn-o',onClose,'Cancelar'),
        parsed && h('button',{className:'btn btn-g',onClick:doImport,
          disabled:qtd===0,style:qtd===0?{opacity:.5}:{}},
          `✅ Importar ${qtd} perícia${qtd!==1?'s':''}`)
      )
    )
  );
}

// ── Modal genérico ────────────────────────────────────────────────────────────
function Modal({title, onClose, children, wide}) {
  return h('div',{className:'overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal'+(wide?' modal-wide':'')},
      h('div',{className:'modal-hdr'},
        h('div',{className:'modal-title'},title),
        btn('btn-o btn-sm',onClose,'✕')
      ),
      children
    )
  );
}

// ── App principal ─────────────────────────────────────────────────────────────
function App() {
  const [pericias,dispatch] = useReducer(reducer, INIT);
  const [page,    setPage]  = useState('lista');
  const [search,  setSrch]  = useState('');
  const [fStatus, setFS]    = useState('');
  const [fTipo,   setFT]    = useState('');
  const [modal,   setModal] = useState(null);
  const [sel,     setSel]   = useState(null);
  const [toast,   setToast] = useState('');
  const fileRef = useRef();

  useEffect(()=>{ saveData(pericias); },[pericias]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(pericias,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'pericias_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
  };

  const importJSON = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(Array.isArray(data)){ dispatch({type:'REPLACE',list:data}); showToast('✅ Backup restaurado!'); }
      } catch { alert('Arquivo inválido.'); }
    };
    reader.readAsText(file);
    e.target.value='';
  };

  const filtered = useMemo(()=>pericias.filter(p=>{
    const q=search.toLowerCase();
    const mQ=!q||p.paciente.toLowerCase().includes(q)||p.processo.includes(q)||(p.cid||'').toLowerCase().includes(q);
    return mQ&&(!fStatus||p.status===fStatus)&&(!fTipo||p.tipo===fTipo);
  }),[pericias,search,fStatus,fTipo]);

  const stats = useMemo(()=>({
    total:    pericias.length,
    agend:    pericias.filter(p=>p.status==='Agendada').length,
    real:     pericias.filter(p=>p.status==='Realizada'||p.status==='Laudo Emitido').length,
    pend:     pericias.filter(p=>p.status==='Pendente').length,
  }),[pericias]);

  const today = new Date().toISOString().slice(0,10);
  const proximas = pericias.filter(p=>p.data>=today&&p.status==='Agendada')
    .sort((a,b)=>a.data.localeCompare(b.data)||a.hora.localeCompare(b.hora)).slice(0,6);

  // ── Sidebar ──
  const navBtn = (id,ic,lb) => h('button',{
    key:id, className:'nav-btn'+(page===id?' active':''),
    onClick:()=>setPage(id)
  }, h('span',null,ic), lb);

  const sidebar = h('aside',{className:'sidebar'},
    h('div',{className:'logo'},
      h('div',{className:'logo-icon'},'⚕️'),
      h('div',null, h('div',{className:'logo-text'},'PericiasMed'), h('div',{className:'logo-sub'},'v2.1'))
    ),
    h('div',{className:'nav-sec'},'Navegação'),
    navBtn('dashboard','📊','Dashboard'),
    navBtn('lista',   '📋','Perícias'),
    navBtn('agenda',  '📅','Agenda'),
    navBtn('laudos',  '📝','Laudos'),
    h('div',{style:{marginTop:'auto',paddingTop:14,borderTop:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:6}}),
    h('button',{className:'nav-btn',onClick:exportJSON,style:{fontSize:12}},'💾 Exportar backup'),
    h('label',{className:'nav-btn',style:{cursor:'pointer',fontSize:12}},
      '📂 Restaurar backup',
      h('input',{type:'file',accept:'.json',onChange:importJSON,style:{display:'none'},ref:fileRef})
    )
  );

  // ── Bottom nav mobile ──
  const bnav = h('nav',{className:'bnav'},
    [['dashboard','📊','Dashboard'],['lista','📋','Perícias'],['agenda','📅','Agenda'],['laudos','📝','Laudos']]
    .map(([id,ic,lb])=>h('button',{key:id,className:'bnav-btn',
      style:{color:page===id?'var(--accent)':'var(--muted)'},onClick:()=>setPage(id)},
      h('span',{className:'bnav-ic'},ic), lb))
  );

  // ── Dashboard ──
  const pageDash = h('div',null,
    h('div',{className:'page-title'},'Dashboard'),
    h('div',{className:'page-sub'},'Visão geral das suas perícias'),
    h('div',{className:'stats'},
      h('div',{className:'stat'}, h('div',{className:'stat-lbl'},'Total'), h('div',{className:'stat-val c-b'},stats.total)),
      h('div',{className:'stat'}, h('div',{className:'stat-lbl'},'Agendadas'), h('div',{className:'stat-val c-y'},stats.agend)),
      h('div',{className:'stat'}, h('div',{className:'stat-lbl'},'Realizadas'), h('div',{className:'stat-val c-g'},stats.real)),
      h('div',{className:'stat'}, h('div',{className:'stat-lbl'},'Pendentes'), h('div',{className:'stat-val c-r'},stats.pend))
    ),
    h('div',{style:{fontWeight:700,fontSize:15,marginBottom:12}},'⏳ Próximas agendadas'),
    proximas.length===0
      ? h('div',{className:'empty',style:{padding:'24px 0'}},h('p',null,'Nenhuma perícia agendada.'))
      : h('div',{className:'tbl-wrap'},
          h('table',null,
            h('thead',null,h('tr',null,h('th',null,'Paciente'),h('th',null,'Data / Hora'),h('th',null,'Tipo'),h('th',null,'Órgão'))),
            h('tbody',null,proximas.map(p=>h('tr',{key:p.id,style:{cursor:'pointer'},onClick:()=>{setSel(p);setModal('view');}},
              h('td',null,h('strong',null,p.paciente),h('br'),h('span',{style:{color:'var(--muted)',fontSize:11}},p.processo)),
              h('td',{style:{fontFamily:'monospace',fontSize:12}},fmt(p.data),p.hora?(' • '+p.hora):''),
              h('td',{style:{fontSize:12,color:'var(--muted)'}},p.tipo),
              h('td',{style:{fontSize:12}},p.orgao||'–')
            )))
          )
        ),
    h('div',{style:{marginTop:22}},
      h('div',{style:{fontWeight:700,fontSize:15,marginBottom:12}},'📊 Por status'),
      h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
        STATUS.map(s=>{
          const n=pericias.filter(p=>p.status===s).length;
          const pct=pericias.length?Math.round(n/pericias.length*100):0;
          return h('div',{key:s,className:'stat',style:{flex:'1',minWidth:110}},
            h('div',{className:'stat-lbl'},s),
            h('div',{style:{fontSize:20,fontWeight:700,fontFamily:'monospace'}},n),
            h('div',{style:{marginTop:8,height:4,borderRadius:2,background:'var(--border)'}},
              h('div',{style:{height:'100%',borderRadius:2,width:pct+'%',background:'linear-gradient(90deg,#4f8ef7,#7c5cfc)'}})
            ),
            h('div',{style:{fontSize:10,color:'var(--muted)',marginTop:3,fontFamily:'monospace'}},pct+'%')
          );
        })
      )
    )
  );

  // ── Lista ──
  const pageLista = h('div',null,
    h('div',{className:'page-title'},'Perícias Médicas'),
    h('div',{className:'page-sub'},pericias.length+' registros'),
    h('div',{className:'toolbar'},
      h('input',{className:'srch',placeholder:'🔍 Buscar por nome, processo ou CID...',value:search,onChange:e=>setSrch(e.target.value)}),
      h('select',{className:'fsel',value:fStatus,onChange:e=>setFS(e.target.value)},
        h('option',{value:''},'Todos os status'), STATUS.map(s=>h('option',{key:s},s))),
      h('select',{className:'fsel',value:fTipo,onChange:e=>setFT(e.target.value)},
        h('option',{value:''},'Todos os tipos'), TIPOS.map(t=>h('option',{key:t},t))),
      btn('btn-g',()=>setModal('import'),'📥 Importar Pauta'),
      btn('btn-p',()=>{setSel(null);setModal('new');},'+ Nova')
    ),
    filtered.length===0
      ? h('div',{className:'empty'},h('div',{className:'empty-ic'},'🔍'),h('h3',null,'Nenhuma perícia encontrada'),h('p',null,'Ajuste os filtros ou cadastre uma nova.'))
      : h('div',{className:'tbl-wrap'},
          h('table',null,
            h('thead',null,h('tr',null,
              h('th',null,'#'),h('th',null,'Paciente'),h('th',null,'Processo'),
              h('th',null,'Tipo'),h('th',null,'Data / Hora'),h('th',null,'CID'),
              h('th',null,'Status'),h('th',null,'Ações')
            )),
            h('tbody',null,filtered.map((p,i)=>h('tr',{key:p.id},
              h('td',{style:{color:'var(--muted)',fontFamily:'monospace',fontSize:11}},i+1),
              h('td',null,
                h('strong',{style:{display:'block'}},p.paciente),
                h('span',{style:{fontSize:11,color:'var(--muted)'}},p.orgao||'–'),
                p.reagendado&&h('span',{className:'badge b-rg',style:{display:'inline-flex',marginTop:3}},'reagendado')
              ),
              h('td',{style:{fontFamily:'monospace',fontSize:11,color:'var(--muted)'}},p.processo),
              h('td',{style:{fontSize:12}},p.tipo),
              h('td',{style:{fontFamily:'monospace',fontSize:12}},
                fmt(p.data), p.hora&&h('span',{style:{display:'block',fontSize:10,color:'var(--muted)'}},p.hora)),
              h('td',{style:{fontFamily:'monospace',fontSize:12}},p.cid||'–'),
              h('td',null,Badge(p.status)),
              h('td',null,h('div',{style:{display:'flex',gap:5}},
                h('button',{className:'btn btn-o btn-sm',title:'Ver',onClick:()=>{setSel(p);setModal('view');}}, '👁'),
                h('button',{className:'btn btn-o btn-sm',title:'Editar',onClick:()=>{setSel(p);setModal('edit');}}, '✏️'),
                h('button',{className:'btn btn-d btn-sm',title:'Excluir',
                  onClick:()=>{ if(confirm('Excluir perícia de '+p.paciente+'?')) dispatch({type:'DEL',id:p.id}); }}, '🗑')
              ))
            )))
          )
        )
  );

  // ── Agenda ──
  const sorted = pericias.slice().sort((a,b)=>a.data.localeCompare(b.data)||a.hora.localeCompare(b.hora));
  const pageAgenda = h('div',null,
    h('div',{className:'page-title'},'Agenda'),
    h('div',{className:'page-sub'},'Perícias em ordem cronológica'),
    h('div',{className:'tl'},sorted.map((p,i)=>
      h('div',{key:p.id,className:'tl-item'},
        h('div',{className:'tl-line'},
          h('div',{className:'tl-dot',style:{background:p.data<today?'var(--muted)':'var(--accent)'}}),
          i<sorted.length-1&&h('div',{className:'tl-bar'})
        ),
        h('div',{className:'tl-body'},
          h('div',{className:'tl-date'},fmt(p.data),p.hora&&(' • '+p.hora)),
          h('div',{className:'tl-text'},
            h('strong',null,p.paciente),' ',Badge(p.status),
            p.reagendado&&h('span',{className:'badge b-rg',style:{marginLeft:4}},'reagendado')
          ),
          h('div',{style:{fontSize:11,color:'var(--muted)',marginTop:2}},
            p.tipo,' • ',p.orgao||'–',p.cid&&(' • CID '+p.cid)),
          p.obs&&h('div',{style:{fontSize:12,color:'var(--yellow)',marginTop:4}},'⚠ ',p.obs)
        )
      )
    ))
  );

  // ── Laudos ──
  const comLaudo = pericias.filter(p=>p.laudo);
  const pageLaudos = h('div',null,
    h('div',{className:'page-title'},'Laudos'),
    h('div',{className:'page-sub'},'Perícias com conclusão registrada'),
    comLaudo.length===0
      ? h('div',{className:'empty'},h('div',{className:'empty-ic'},'📝'),h('h3',null,'Nenhum laudo registrado'),h('p',null,'Edite uma perícia e adicione a conclusão.'))
      : comLaudo.map(p=>h('div',{key:p.id,className:'detail-card'},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}},
            h('div',null,
              h('div',{style:{fontWeight:700,fontSize:15}},p.paciente),
              h('div',{style:{fontSize:11,color:'var(--muted)',fontFamily:'monospace',marginTop:2}},
                p.processo,' • ',p.tipo,' • ',fmt(p.data))
            ),
            Badge(p.status)
          ),
          h('div',{style:{background:'var(--card)',borderRadius:8,padding:'12px 14px',borderLeft:'3px solid var(--accent2)'}},
            h('div',{style:{fontSize:10,fontFamily:'monospace',color:'var(--muted)',marginBottom:6}},'CONCLUSÃO PERICIAL'),
            h('div',{style:{fontSize:13,lineHeight:1.7}},p.laudo)
          ),
          p.patologia&&h('div',{style:{fontSize:12,color:'var(--muted)',marginTop:10}},'🏥 ',p.patologia,p.cid&&(' (CID '+p.cid+')'))
        ))
  );

  // ── Vista detalhe ──
  const viewModal = sel && modal==='view' && h(Modal,{title:'Detalhes da Perícia',onClose:()=>setModal(null)},
    h('div',{style:{marginBottom:14}},
      h('div',{style:{fontSize:18,fontWeight:700}},sel.paciente),
      h('div',{style:{fontSize:12,color:'var(--muted)',fontFamily:'monospace',marginTop:4}},sel.processo),
      h('div',{style:{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}},
        Badge(sel.status),
        sel.reagendado&&h('span',{className:'badge b-rg'},'reagendado')
      )
    ),
    h('div',{className:'d-grid'},
      [['Tipo','tipo'],['Órgão','orgao'],['Data','data'],['Hora','hora'],['CID-10','cid'],['Patologia','patologia']]
      .map(([l,k])=>h('div',{key:k,className:'d-field'},
        h('label',null,l), h('span',null,k==='data'?fmt(sel[k]):(sel[k]||'–'))
      ))
    ),
    sel.laudo&&h('div',{style:{background:'var(--card)',borderRadius:8,padding:'12px 14px',borderLeft:'3px solid var(--accent2)',marginBottom:12}},
      h('div',{style:{fontSize:10,fontFamily:'monospace',color:'var(--muted)',marginBottom:6}},'CONCLUSÃO PERICIAL'),
      h('div',{style:{fontSize:13}},sel.laudo)
    ),
    sel.obs&&h('div',{style:{background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.2)',borderRadius:8,padding:'12px 14px'}},
      h('div',{style:{fontSize:11,color:'var(--yellow)',marginBottom:4}},'⚠ OBSERVAÇÕES'),
      h('div',{style:{fontSize:13}},sel.obs)
    ),
    h('div',{className:'mfooter'},
      btn('btn-o',()=>setModal(null),'Fechar'),
      btn('btn-p',()=>setModal('edit'),'✏️ Editar')
    )
  );

  return h('div',{className:'app'},
    sidebar,
    h('main',{className:'main'},
      page==='dashboard' && pageDash,
      page==='lista'     && pageLista,
      page==='agenda'    && pageAgenda,
      page==='laudos'    && pageLaudos
    ),
    bnav,
    modal==='import' && h(Importador,{
      existentes:pericias, onClose:()=>setModal(null),
      onImport: list=>{ dispatch({type:'BATCH',list}); showToast('✅ '+list.length+' perícia'+(list.length!==1?'s':'')+' importada'+(list.length!==1?'s':'')+' !'); }
    }),
    (modal==='new'||modal==='edit') && h(Modal,{
      title: modal==='new'?'Nova Perícia':'Editar Perícia', onClose:()=>setModal(null)
    }, h(PericiaForm,{
      initial: modal==='edit'?sel:null,
      onSave: f=>dispatch({type:modal==='new'?'ADD':'UPD', p:{...f,id:sel?.id}}),
      onClose:()=>setModal(null)
    })),
    viewModal,
    toast && h('div',{className:'toast'},toast)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
